services:
  postgres:
    image: postgres:16
    container_name: shopshare_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: shopshare
      POSTGRES_USER: shopuser
      POSTGRES_PASSWORD: shoppassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopuser -d shopshare"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
