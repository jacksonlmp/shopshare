services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopshare_backend
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: change-me
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: "*"
      CORS_ALLOW_ALL_ORIGINS: "true"
      POSTGRES_DB: shopshare
      POSTGRES_USER: shopuser
      POSTGRES_PASSWORD: shoppassword
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: python manage.py runserver 0.0.0.0:8000

  postgres:
    image: postgres:16
    container_name: shopshare_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: shopshare
      POSTGRES_USER: shopuser
      POSTGRES_PASSWORD: shoppassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopuser -d shopshare"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
