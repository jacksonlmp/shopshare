openapi: 3.0.3
info:
  title: ShopShare API
  description: Backend API for the ShopShare collaborative shopping list app.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: users
    description: User management
  - name: lists
    description: Shopping list management
  - name: items
    description: Shopping item management

paths:
  /api/users:
    post:
      tags: [users]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [display_name, avatar_emoji]
              properties:
                display_name:
                  type: string
                  maxLength: 50
                  example: Alice
                avatar_emoji:
                  type: string
                  maxLength: 5
                  example: "🧑"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/lists:
    post:
      tags: [lists]
      summary: Create list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, owner_id]
              properties:
                name:
                  type: string
                  maxLength: 100
                  example: Weekly Shop
                owner_id:
                  type: string
                  format: uuid
      responses:
        "201":
          description: List created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShoppingList"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/lists/join:
    post:
      tags: [lists]
      summary: Join list via share code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [share_code, user_id]
              properties:
                share_code:
                  type: string
                  example: CFHLZL
                user_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Successfully joined
          content:
            application/json:
              schema:
                type: object
                properties:
                  list_id:
                    type: string
                    format: uuid
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Already a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/lists/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [lists]
      summary: Get list details
      description: Returns the list with all members and items (with category and added_by user).
      responses:
        "200":
          description: List details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShoppingListDetail"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [lists]
      summary: Rename or archive list (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  type: string
                  format: uuid
                  description: Must be the list owner
                name:
                  type: string
                  maxLength: 100
                is_archived:
                  type: boolean
      responses:
        "200":
          description: Updated list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShoppingList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/lists/{id}/items:
    parameters:
      - $ref: "#/components/parameters/PathId"
    post:
      tags: [items]
      summary: Add item to list
      description: User must be a member of the list.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [added_by, name]
              properties:
                added_by:
                  type: string
                  format: uuid
                name:
                  type: string
                  maxLength: 100
                  example: Milk
                quantity:
                  type: number
                  format: float
                  default: 1.0
                  example: 2.0
                unit:
                  type: string
                  maxLength: 20
                  nullable: true
                  example: L
                note:
                  type: string
                  nullable: true
                category_id:
                  type: integer
                  nullable: true
      responses:
        "201":
          description: Item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/lists/{id}/suggestions:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [items]
      summary: Get item suggestions for a list
      description: Top 10 items by frequency from history, excluding currently active (unchecked) items.
      responses:
        "200":
          description: Suggestion list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Suggestion"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/items/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    patch:
      tags: [items]
      summary: Check or uncheck item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [is_checked]
              properties:
                is_checked:
                  type: boolean
                checked_by:
                  type: string
                  format: uuid
                  nullable: true
                  description: Required when is_checked is true
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemCheckResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [items]
      summary: Delete item
      description: Only the item creator or the list owner can delete.
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    PathId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: List not found.
        code:
          type: string
          example: LIST_NOT_FOUND

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        display_name: { type: string }
        avatar_emoji: { type: string }
        device_token: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    ShoppingList:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        share_code: { type: string, example: CFHLZL }
        owner_id: { type: string, format: uuid }
        is_archived: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ShoppingListDetail:
      allOf:
        - $ref: "#/components/schemas/ShoppingList"
        - type: object
          properties:
            members:
              type: array
              items:
                $ref: "#/components/schemas/Member"
            items:
              type: array
              items:
                $ref: "#/components/schemas/ItemDetail"

    Member:
      type: object
      properties:
        user_id: { type: string, format: uuid }
        display_name: { type: string }
        avatar_emoji: { type: string }
        role: { type: string, enum: [owner, member] }
        joined_at: { type: string, format: date-time }

    Item:
      type: object
      properties:
        id: { type: string, format: uuid }
        list_id: { type: string, format: uuid }
        name: { type: string }
        quantity: { type: number, format: float }
        unit: { type: string, nullable: true }
        note: { type: string, nullable: true }
        category_id: { type: integer, nullable: true }
        is_checked: { type: boolean }
        sort_order: { type: integer }
        added_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }

    ItemDetail:
      allOf:
        - $ref: "#/components/schemas/Item"
        - type: object
          properties:
            added_by:
              $ref: "#/components/schemas/UserRef"
            category:
              nullable: true
              allOf:
                - $ref: "#/components/schemas/Category"
            checked_by: { type: string, format: uuid, nullable: true }
            checked_at: { type: string, format: date-time, nullable: true }

    ItemCheckResult:
      type: object
      properties:
        id: { type: string, format: uuid }
        list_id: { type: string, format: uuid }
        name: { type: string }
        is_checked: { type: boolean }
        checked_by: { type: string, format: uuid, nullable: true }
        checked_at: { type: string, format: date-time, nullable: true }

    UserRef:
      type: object
      properties:
        user_id: { type: string, format: uuid }
        display_name: { type: string }
        avatar_emoji: { type: string }

    Category:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        emoji: { type: string }
        color_hex: { type: string, example: "#4CAF50" }

    Suggestion:
      type: object
      properties:
        item_name: { type: string }
        times_added: { type: integer }
        category_id: { type: integer, nullable: true }
        last_used_at: { type: string, format: date-time }
